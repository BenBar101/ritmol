<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'none';
      script-src 'self' 'inline-speculation-rules' https://accounts.google.com https://apis.google.com;
      connect-src 'self'
        https://generativelanguage.googleapis.com
        https://api.dropboxapi.com
        https://content.dropboxapi.com
        https://www.dropbox.com
        https://api.dropbox.com
        https://www.googleapis.com
        https://api.quotable.io
        https://api.quotable.kameswari.in
        https://zenquotes.io;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      worker-src 'self';
      manifest-src 'self';
      frame-src 'none';
      base-uri 'self';
      form-action 'none';
    "
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RITMOL" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="32x32" />
  <link rel="apple-touch-icon" href="/favicon.ico" />
  <title>RITMOL</title>
  <!-- GitHub Pages SPA: decode redirect from 404.html -->
  <script>
    (function() {
      var l = window.location;
      if (l.search[1] === 'p') {
        var decoded = l.search.slice(1).split('&').reduce(function(a, b) {
          var kv = b.split('='); a[kv[0]] = kv.slice(1).join('='); return a;
        }, {});
        var path = decoded.p ? decoded.p.replace(/~and~/g, '&') : '';
        var query = decoded.q ? '?' + decoded.q.replace(/~and~/g, '&') : '';
        window.history.replaceState(null, null, l.pathname.split('/').slice(0, 2).join('/') + '/' + path + query + l.hash);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IM+Fell+English:ital@0;1&family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <script>
    (function() {
      try {
        // Dev mode uses ritmol_dev_jv_theme; prod uses jv_theme (see App.jsx storageKey)
        var v = localStorage.getItem("ritmol_dev_jv_theme") || localStorage.getItem("jv_theme");
        var t = (v && JSON.parse(v)) === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    /* Theme: default dark (overridden by [data-theme] from JS) */
    :root, [data-theme="dark"] {
      --bg: #0a0a0a;
      --text: #e8e8e8;
      --surface: #111;
      --surface2: #1a1a1a;
      --border: #222;
      --border2: #333;
      --muted: #444;
      --muted2: #555;
      --muted3: #666;
      --scroll-track: #111;
      --scroll-thumb: #444;
    }
    [data-theme="light"] {
      --bg: #f0f0f0;
      --text: #1a1a1a;
      --surface: #fff;
      --surface2: #e8e8e8;
      --border: #ddd;
      --border2: #ccc;
      --muted: #666;
      --muted2: #555;
      --muted3: #444;
      --scroll-track: #e8e8e8;
      --scroll-thumb: #aaa;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    #root { display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: var(--scroll-track); }
    ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); }
    input, textarea, button { font-family: inherit; }
    button { cursor: pointer; border: none; background: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        var base = document.querySelector('base')?.getAttribute('href') || '/';
        navigator.serviceWorker.register(base.replace(/\/$/, '') + '/sw.js').catch(function() {});
      });
    }
  </script>
</body>
</html>
